<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Woodbury Zoning Trends</title>
<link rel="stylesheet" href="/chat.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1216;
    --panel: #1a1f26;
    --text: #e6ebf2;
    --muted: #8a95a5;
    --accent: #ff6b35;
    --blue: #4da6ff;
    --border: #2b3340;
  }
  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  body { padding: 0 0 80px; }
  header { padding: 20px 40px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 20px; }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { color: var(--muted); font-size: 13px; }
  header nav { margin-left: auto; }
  header nav a { color: var(--muted); text-decoration: none; font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; }
  header nav a:hover { color: var(--text); border-color: var(--accent); }

  .tabs { max-width: 840px; margin: 18px auto 0; padding: 0 28px; display: flex; gap: 4px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 16px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }

  main { max-width: 840px; margin: 0 auto; padding: 24px 28px; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; margin: 36px 0 14px; }
  .view { display: none; }
  .view.active { display: block; }

  .prediction {
    background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(77,166,255,0.06));
    border: 1px solid rgba(255,107,53,0.35);
    border-radius: 14px; padding: 24px 28px; margin-bottom: 32px;
  }
  .prediction .year-tag {
    display: inline-block; color: var(--accent); font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px;
  }
  .prediction h3 { margin: 0 0 14px; font-size: 22px; font-weight: 600; }
  .prediction p { margin: 0 0 10px; font-size: 15px; line-height: 1.7; color: #e6ebf2; }
  .prediction p:last-child { margin-bottom: 0; }

  .framing {
    background: rgba(77,166,255,0.04);
    border-left: 3px solid var(--blue);
    padding: 16px 20px; margin-bottom: 24px; border-radius: 4px;
    font-size: 14px; line-height: 1.65; color: #d0dae6;
  }
  .framing .label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
                    letter-spacing: 0.1em; color: var(--blue); margin-bottom: 8px; }

  .years { display: flex; flex-direction: column; gap: 10px; }
  .year-card {
    display: grid; grid-template-columns: 72px 1fr; gap: 20px;
    padding: 18px 0; border-bottom: 1px solid var(--border);
  }
  .year-card:last-child { border-bottom: none; }
  .year-card .yr {
    font-variant-numeric: tabular-nums; font-size: 22px; font-weight: 600;
    color: var(--accent); letter-spacing: -0.01em; padding-top: 2px;
  }
  .year-card .stats {
    font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5;
    font-variant-numeric: tabular-nums;
  }
  .year-card .summary { font-size: 14.5px; line-height: 1.65; color: var(--text); }
  .year-card .summary p { margin: 0; }

  .kw-pills { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 5px; }
  .kw-pill {
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    background: rgba(77,166,255,0.12); color: #a9cbec;
    font-variant-numeric: tabular-nums;
  }
  .kw-pill.religious  { background: rgba(255,107,53,0.13); color: #ffb89a; }
  .kw-pill.cross      { background: rgba(77,166,255,0.15); color: #a9cbec; }
  .kw-pill.household  { background: rgba(255,62,154,0.12); color: #ffb0d4; }

  footer {
    max-width: 840px; margin: 40px auto 0; padding: 20px 28px;
    color: var(--muted); font-size: 11px; border-top: 1px solid var(--border);
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  footer span b { color: var(--text); font-variant-numeric: tabular-nums; }

  .loading, .error { color: var(--muted); text-align: center; padding: 80px 20px; font-size: 14px; }
  .error { color: #ffa0a0; }

  /* Charts */
  .chart-grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 24px; }
  @media (min-width: 760px) { .chart-grid.two { grid-template-columns: 1fr 1fr; } }
  .chart-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px;
  }
  .chart-card h3 {
    margin: 0 0 10px; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
  }
  .chart-card .lede {
    color: var(--text); font-size: 20px; font-weight: 600;
    letter-spacing: -0.01em; margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
  }
  .chart-card .lede small { color: var(--muted); font-size: 12px; font-weight: 400; margin-left: 8px; }
  .chart-wrap { position: relative; height: 240px; }
  .chart-wrap.tall { height: 320px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .kpi {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; flex-direction: column; gap: 4px;
  }
  .kpi .v { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .kpi .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .kpi .v.orange { color: var(--accent); }
  .kpi .v.blue { color: var(--blue); }
  .kpi .v.pink { color: #ff3e9a; }
</style>
</head>
<body>
<header>
  <h1>Village of Woodbury — Zoning Trends</h1>
  <span class="sub">12-year analysis + 2026 outlook</span>
  <nav><a href="index.html">← Back to map</a></nav>
</header>

<div class="tabs">
  <button class="tab active" data-view="volume">Volume</button>
  <button class="tab" data-view="demographics">Demographics</button>
</div>

<main id="content">
  <div class="loading">Loading analysis…</div>
</main>

<button id="chat-toggle" title="Ask about these minutes">💬</button>
<div id="chat-panel">
  <div id="chat-header">
    <h2>Ask the minutes</h2>
    <button id="chat-close" title="Close">×</button>
  </div>
  <div id="chat-messages">
    <div class="chat-msg system">Ask about applications, addresses, applicants, or patterns across years. Click a source to open its PDF.</div>
  </div>
  <div id="chat-input-wrap">
    <textarea id="chat-input" placeholder="Ask a question…" rows="1"></textarea>
    <button id="chat-send">Send</button>
  </div>
</div>
<script defer src="/chat.js"></script>

<script>
(async () => {
  const content = document.getElementById("content");
  let t;
  try {
    t = await fetch("trends.json").then(r => r.ok ? r.json() : Promise.reject(r.status));
  } catch (e) {
    content.innerHTML = `<div class="error">Couldn't load trends.json. Run <code>.venv/bin/python generate_trends.py</code> first.</div>`;
    return;
  }

  const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  function statLine(stats) {
    if (!stats) return "";
    const parts = [`${stats.total_applications} apps`];
    const b = stats.by_board || {};
    if (b.ZBA) parts.push(`ZBA ${b.ZBA}`);
    if (b.PB) parts.push(`PB ${b.PB}`);
    const dist = (stats.top_zoning_districts || []).slice(0, 3).map(d => d[0]).filter(Boolean);
    if (dist.length) parts.push(`top: ${dist.join(", ")}`);
    return parts.join(" · ");
  }

  // Chart.js global theme tweaks
  if (window.Chart) {
    Chart.defaults.color = "#8a95a5";
    Chart.defaults.borderColor = "rgba(139, 149, 165, 0.15)";
    Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    Chart.defaults.plugins.legend.labels.boxWidth = 12;
    Chart.defaults.plugins.legend.labels.boxHeight = 12;
    Chart.defaults.plugins.legend.labels.padding = 14;
  }
  const gridLine = { color: "rgba(139, 149, 165, 0.08)" };

  function renderVolumeView() {
    const frag = document.createElement("div");
    frag.className = "view active";
    frag.dataset.view = "volume";

    const years = Object.keys(t.years).map(y => parseInt(y, 10)).sort((a, b) => a - b);
    const stats = t.source_stats || {};
    const zbaData = years.map(y => (stats[String(y)]?.by_board?.ZBA) || 0);
    const pbData  = years.map(y => (stats[String(y)]?.by_board?.PB)  || 0);
    const totals  = years.map((y, i) => zbaData[i] + pbData[i]);
    const total = totals.reduce((a, b) => a + b, 0);
    const peakIdx = totals.indexOf(Math.max(...totals));
    const avg = total / years.length;

    // KPI row
    const kpiRow = document.createElement("div");
    kpiRow.className = "kpi-row";
    kpiRow.innerHTML = `
      <div class="kpi"><span class="v">${total.toLocaleString()}</span><span class="l">Total applications</span></div>
      <div class="kpi"><span class="v orange">${zbaData.reduce((a,b)=>a+b,0).toLocaleString()}</span><span class="l">ZBA · ${years.length} yrs</span></div>
      <div class="kpi"><span class="v blue">${pbData.reduce((a,b)=>a+b,0).toLocaleString()}</span><span class="l">Planning Board · ${years.length} yrs</span></div>
      <div class="kpi"><span class="v">${years[peakIdx]}</span><span class="l">Peak year · ${totals[peakIdx]} apps</span></div>
      <div class="kpi"><span class="v">${avg.toFixed(0)}</span><span class="l">Avg apps / year</span></div>
    `;
    frag.appendChild(kpiRow);

    // Prediction card
    const pred = document.createElement("div");
    pred.className = "prediction";
    pred.innerHTML = `
      <div class="year-tag">Prediction · 2026</div>
      <h3>What 2026 looks like, based on 12 years of trajectory</h3>
      <p>${esc(t.prediction_2026).split(/\n+/).join("</p><p>")}</p>
    `;
    frag.appendChild(pred);

    // Main stacked bar: applications per year by board
    const stackGrid = document.createElement("div");
    stackGrid.className = "chart-grid";
    stackGrid.innerHTML = `
      <div class="chart-card">
        <h3>Applications per year</h3>
        <div class="lede">${total.toLocaleString()} total<small>across ZBA and Planning Board, ${years[0]}–${years[years.length-1]}</small></div>
        <div class="chart-wrap tall"><canvas id="chart-volume-by-year"></canvas></div>
      </div>
    `;
    frag.appendChild(stackGrid);

    // Two-column: top repeat players + top zoning districts
    const dualGrid = document.createElement("div");
    dualGrid.className = "chart-grid two";
    dualGrid.innerHTML = `
      <div class="chart-card">
        <h3>Repeat players (name mentions)</h3>
        <div class="lede" id="top-players-lede"></div>
        <div class="chart-wrap"><canvas id="chart-players"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Top zoning districts</h3>
        <div class="lede" id="top-districts-lede"></div>
        <div class="chart-wrap"><canvas id="chart-districts"></canvas></div>
      </div>
    `;
    frag.appendChild(dualGrid);

    // Schedule chart rendering for after the fragment is in the DOM
    frag._renderCharts = () => {
      // 1. Stacked bar
      new Chart(document.getElementById("chart-volume-by-year"), {
        type: "bar",
        data: {
          labels: years,
          datasets: [
            { label: "ZBA", data: zbaData, backgroundColor: "#ff6b35", borderRadius: 3 },
            { label: "Planning Board", data: pbData, backgroundColor: "#4da6ff", borderRadius: 3 },
          ],
        },
        options: {
          maintainAspectRatio: false,
          scales: {
            x: { stacked: true, grid: gridLine },
            y: { stacked: true, grid: gridLine, ticks: { stepSize: 50 } },
          },
          plugins: { legend: { position: "bottom" } },
        },
      });

      // 2. Repeat players — aggregate across years
      const playerTotals = {};
      for (const y of years) {
        for (const [p, n] of Object.entries(stats[String(y)]?.repeat_player_mentions || {})) {
          playerTotals[p] = (playerTotals[p] || 0) + n;
        }
      }
      const topPlayers = Object.entries(playerTotals)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);
      document.getElementById("top-players-lede").innerHTML =
        topPlayers.length
          ? `${esc(topPlayers[0][0])}<small>most-mentioned name across 12 years (${topPlayers[0][1]} hits)</small>`
          : "";
      new Chart(document.getElementById("chart-players"), {
        type: "bar",
        data: {
          labels: topPlayers.map(p => p[0].replace(/^./, s => s.toUpperCase())),
          datasets: [{ label: "Mentions", data: topPlayers.map(p => p[1]), backgroundColor: "#ff6b35", borderRadius: 3 }],
        },
        options: {
          indexAxis: "y",
          maintainAspectRatio: false,
          scales: { x: { grid: gridLine }, y: { grid: { display: false } } },
          plugins: { legend: { display: false } },
        },
      });

      // 3. Top zoning districts — aggregate
      const districtTotals = {};
      for (const y of years) {
        for (const [d, n] of (stats[String(y)]?.top_zoning_districts || [])) {
          if (!d) continue;
          districtTotals[d] = (districtTotals[d] || 0) + n;
        }
      }
      const topDistricts = Object.entries(districtTotals)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8);
      document.getElementById("top-districts-lede").innerHTML =
        topDistricts.length
          ? `${esc(topDistricts[0][0])}<small>most active district (${topDistricts[0][1]} applications)</small>`
          : "";
      new Chart(document.getElementById("chart-districts"), {
        type: "doughnut",
        data: {
          labels: topDistricts.map(d => d[0]),
          datasets: [{
            data: topDistricts.map(d => d[1]),
            backgroundColor: ["#ff6b35","#4da6ff","#ff3e9a","#ffb347","#8e7bf3","#57c4b6","#e86e6e","#89b4f5"],
            borderColor: "#1a1f26", borderWidth: 2,
          }],
        },
        options: {
          maintainAspectRatio: false,
          cutout: "55%",
          plugins: { legend: { position: "right", labels: { boxWidth: 10, font: { size: 11 } } } },
        },
      });
    };

    const h = document.createElement("h2");
    h.textContent = "History";
    frag.appendChild(h);

    const grid = document.createElement("div");
    grid.className = "years";
    const historyYears = [...years].sort((a, b) => b - a);
    for (const y of historyYears) {
      const stats = (t.source_stats || {})[String(y)];
      const el = document.createElement("div");
      el.className = "year-card";
      el.innerHTML = `
        <div>
          <div class="yr">${y}</div>
          <div class="stats">${esc(statLine(stats))}</div>
        </div>
        <div class="summary"><p>${esc(t.years[y])}</p></div>
      `;
      grid.appendChild(el);
    }
    frag.appendChild(grid);
    return frag;
  }

  function renderDemoView() {
    const d = t.demographics;
    const frag = document.createElement("div");
    frag.className = "view";
    frag.dataset.view = "demographics";
    if (!d) {
      frag.innerHTML = `<div class="error">No demographics section in trends.json. Regenerate with <code>generate_trends.py</code>.</div>`;
      return frag;
    }

    const framing = document.createElement("div");
    framing.className = "framing";
    framing.innerHTML = `<span class="label">Scope & caveats</span>${esc(d.framing).split(/\n+/).map(p => `<p>${p}</p>`).join("")}`;
    frag.appendChild(framing);

    // Aggregate category totals per year
    const hits = d.keyword_hits_per_year || {};
    const years = Object.keys(d.years).map(y => parseInt(y, 10)).sort((a, b) => a - b);
    const catSum = (cat, y) =>
      Object.values(hits[y]?.[cat] || {}).reduce((a, b) => a + b, 0);
    const religious = years.map(y => catSum("religious_use", y));
    const crossCom  = years.map(y => catSum("cross_community", y));
    const household = years.map(y => catSum("household_adaptation", y));

    const sumAll = arr => arr.reduce((a, b) => a + b, 0);
    const peakRel = years[religious.indexOf(Math.max(...religious))];
    const peakCross = years[crossCom.indexOf(Math.max(...crossCom))];
    const peakHH = years[household.indexOf(Math.max(...household))];

    // KPI row
    const kpiRow = document.createElement("div");
    kpiRow.className = "kpi-row";
    kpiRow.innerHTML = `
      <div class="kpi"><span class="v orange">${sumAll(religious)}</span><span class="l">Religious-use hits · peak ${peakRel}</span></div>
      <div class="kpi"><span class="v blue">${sumAll(crossCom)}</span><span class="l">Cross-community · peak ${peakCross}</span></div>
      <div class="kpi"><span class="v pink">${sumAll(household)}</span><span class="l">Household-adaptation · peak ${peakHH}</span></div>
    `;
    frag.appendChild(kpiRow);

    // Stacked bar chart
    const chartGrid = document.createElement("div");
    chartGrid.className = "chart-grid";
    chartGrid.innerHTML = `
      <div class="chart-card">
        <h3>Demographic signals over time</h3>
        <div class="lede">Keyword hits by category, per year<small>counts are raw occurrences in application text — filings, not residents</small></div>
        <div class="chart-wrap tall"><canvas id="chart-demo-stack"></canvas></div>
      </div>
    `;
    frag.appendChild(chartGrid);

    frag._renderCharts = () => {
      new Chart(document.getElementById("chart-demo-stack"), {
        type: "bar",
        data: {
          labels: years,
          datasets: [
            { label: "Religious-use",       data: religious, backgroundColor: "#ff6b35", borderRadius: 3 },
            { label: "Cross-community",     data: crossCom,  backgroundColor: "#4da6ff", borderRadius: 3 },
            { label: "Household-adaptation",data: household, backgroundColor: "#ff3e9a", borderRadius: 3 },
          ],
        },
        options: {
          maintainAspectRatio: false,
          scales: {
            x: { stacked: true, grid: gridLine },
            y: { stacked: true, grid: gridLine },
          },
          plugins: { legend: { position: "bottom" } },
        },
      });
    };

    const pred = document.createElement("div");
    pred.className = "prediction";
    pred.innerHTML = `
      <div class="year-tag">2026 outlook — demographic signals</div>
      <h3>Extrapolating the signal trajectory</h3>
      <p>${esc(d.outlook_2026).split(/\n+/).join("</p><p>")}</p>
    `;
    frag.appendChild(pred);

    const h = document.createElement("h2");
    h.textContent = "By year";
    frag.appendChild(h);

    const categoryClass = {
      religious_use: "religious", cross_community: "cross", household_adaptation: "household",
    };

    const grid = document.createElement("div");
    grid.className = "years";
    const historyYears = [...years].sort((a, b) => b - a);
    for (const y of historyYears) {
      const yearHits = hits[String(y)] || {};
      const pills = [];
      for (const cat of ["religious_use", "cross_community", "household_adaptation"]) {
        for (const [term, n] of Object.entries(yearHits[cat] || {})) {
          pills.push(`<span class="kw-pill ${categoryClass[cat]}">${esc(term)} ×${n}</span>`);
        }
      }
      const el = document.createElement("div");
      el.className = "year-card";
      el.innerHTML = `
        <div>
          <div class="yr">${y}</div>
          <div class="kw-pills">${pills.join("") || '<span class="stats">no hits</span>'}</div>
        </div>
        <div class="summary"><p>${esc(d.years[y])}</p></div>
      `;
      grid.appendChild(el);
    }
    frag.appendChild(grid);
    return frag;
  }

  const volumeEl = renderVolumeView();
  const demoEl = renderDemoView();
  content.innerHTML = "";
  content.appendChild(volumeEl);
  content.appendChild(demoEl);

  // Render charts after the nodes are attached. Chart.js only measures size
  // correctly on visible elements, so we render the inactive view's charts
  // lazily on the first tab switch.
  const renderedViews = new Set();
  function ensureCharts(view) {
    if (renderedViews.has(view) || !view._renderCharts) return;
    try { view._renderCharts(); } catch (e) { console.warn("chart render:", e); }
    renderedViews.add(view);
  }
  ensureCharts(volumeEl);

  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b === btn));
      document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.dataset.view === btn.dataset.view));
      window.scrollTo(0, 0);
      const activeView = document.querySelector(".view.active");
      if (activeView) ensureCharts(activeView);
    });
  });

  const foot = document.createElement("footer");
  const ts = t.generated_at ? new Date(t.generated_at).toLocaleString() : "—";
  foot.innerHTML = `
    <span>Generated: <b>${esc(ts)}</b></span>
    <span>Model: <b>${esc(t.model || "—")}</b></span>
    <span>Corpus: <b>${esc(t.total_applications)} applications</b></span>
    <span>Tokens: <b>${esc(t.input_tokens)}</b> in · <b>${esc(t.output_tokens)}</b> out</span>
  `;
  document.body.appendChild(foot);
})();
</script>
</body>
</html>
