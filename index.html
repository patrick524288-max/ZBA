<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Woodbury ZBA Applications</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="/chat.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet-imageoverlay-rotated@0.2.1/Leaflet.ImageOverlay.Rotated.js"></script>
<script defer src="/chat.js"></script>
<style>
  :root {
    --bg: #0f1216;
    --panel: #1a1f26;
    --text: #e6ebf2;
    --muted: #8a95a5;
    --accent: #ff6b35;
    --accent-dim: rgba(255,107,53,0.2);
    --border: #2b3340;
  }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
  #app { display: flex; flex-direction: column; height: 100vh; }
  header { padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { color: var(--muted); font-size: 13px; }
  header .count { margin-left: auto; color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; }
  header .count b { color: var(--text); font-weight: 500; }
  .legend { display: flex; gap: 16px; margin-left: 20px; font-size: 12px; color: var(--muted); align-items: center; }
  .legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; border: 1.5px solid #0f1216; }
  .legend .zba { background: #ff6b35; }
  .legend .pb { background: #4da6ff; }
  .legend .pink { background: #ff3e9a; }
  .legend label { cursor: pointer; user-select: none; }
  .legend input { margin-right: 4px; vertical-align: middle; accent-color: var(--accent); }
  #map { flex: 1; background: #0a0d11; }
  #controls { padding: 16px 24px 20px; background: var(--panel); border-top: 1px solid var(--border); }
  .slider-wrap { position: relative; height: 40px; }
  .slider-wrap input[type=range] { position: absolute; width: 100%; top: 14px; margin: 0; pointer-events: none; -webkit-appearance: none; background: transparent; }
  .slider-wrap input[type=range]::-webkit-slider-thumb {
    pointer-events: auto; -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); border: 2px solid #0f1216; cursor: pointer; margin-top: -8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .slider-wrap input[type=range]::-moz-range-thumb {
    pointer-events: auto; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); border: 2px solid #0f1216; cursor: pointer;
  }
  .track { position: absolute; left: 0; right: 0; top: 22px; height: 3px; background: var(--border); border-radius: 3px; }
  .track-active { position: absolute; top: 22px; height: 3px; background: var(--accent); border-radius: 3px; }
  .labels { display: flex; justify-content: space-between; margin-top: 4px; color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
  .readout { text-align: center; margin-top: 6px; font-size: 13px; font-weight: 500; }
  .readout b { color: var(--accent); font-variant-numeric: tabular-nums; }
  .tick { position: absolute; top: 20px; width: 1px; height: 7px; background: var(--border); }
  .popup-inner { font-size: 13px; line-height: 1.5; }
  .popup-inner .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .popup-inner .meta { color: var(--muted); margin-bottom: 6px; font-size: 12px; }
  .popup-inner .desc { max-height: 140px; overflow: auto; }
  /* Leaflet popup theme override */
  .leaflet-popup-content-wrapper { background: #1a1f26; color: var(--text); border: 1px solid var(--border); }
  .leaflet-popup-tip { background: #1a1f26; }
  .leaflet-popup-content { margin: 10px 14px; }
  .leaflet-container { background: #0a0d11; }

  /* Chat UI loaded from chat.css (shared with trends.html) */

  /* Annotations */
  #add-annotation {
    position: fixed; bottom: 180px; right: 24px; z-index: 500;
    width: 44px; height: 44px; border-radius: 50%;
    background: #ff3e9a; color: #0f1216; border: none;
    font-size: 24px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  #add-annotation:hover { transform: scale(1.05); }
  #annotation-form {
    position: fixed; bottom: 180px; right: 80px; z-index: 600;
    width: 320px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  #annotation-form.open { display: block; }
  #annotation-form h3 { margin: 0 0 10px; font-size: 14px; }
  #annotation-form label { display: block; font-size: 11px; color: var(--muted); margin: 8px 0 3px; }
  #annotation-form input, #annotation-form textarea {
    width: 100%; background: #0f1216; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 6px 8px; font: inherit; font-size: 13px; box-sizing: border-box; outline: none;
  }
  #annotation-form input:focus, #annotation-form textarea:focus { border-color: #ff3e9a; }
  #annotation-form textarea { resize: vertical; min-height: 50px; }
  #annotation-form .row { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  #annotation-form button {
    background: #ff3e9a; color: #0f1216; border: none; border-radius: 6px;
    padding: 6px 14px; font-weight: 600; cursor: pointer;
  }
  #annotation-form button.cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  #annotation-form .err { color: #ffa0a0; font-size: 12px; margin-top: 6px; min-height: 1em; }

  /* Cluster timeline */
  #cluster-timeline {
    padding: 10px 24px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,62,154,0.04), transparent);
  }
  #cluster-timeline.hidden { display: none; }
  .ct-header {
    display: flex; align-items: center; gap: 12px;
    font-size: 12px; color: var(--muted); margin-bottom: 10px;
  }
  .ct-header .title { color: #ff3e9a; font-weight: 600; letter-spacing: 0.02em; }
  .ct-header .spacer { flex: 1; }
  .ct-header button {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 4px; padding: 2px 8px; font: inherit; font-size: 11px; cursor: pointer;
  }
  .ct-header button:hover { color: var(--text); border-color: var(--muted); }
  .ct-track { position: relative; height: 24px; margin: 0 6px; }
  .ct-line {
    position: absolute; left: 0; right: 0; top: 50%;
    height: 2px; background: var(--border); border-radius: 2px;
    transform: translateY(-50%);
  }
  .ct-dot {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    background: #ff3e9a; top: 50%; transform: translate(-50%, -50%);
    cursor: pointer; border: 2px solid #0f1216;
    box-shadow: 0 0 0 1px rgba(255,62,154,0.4);
    transition: transform 0.12s;
  }
  .ct-dot:hover { transform: translate(-50%, -50%) scale(1.35); }
  .ct-labels {
    display: flex; justify-content: space-between;
    margin-top: 6px; color: var(--muted); font-size: 10px;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Village of Woodbury — Board Applications</h1>
    <span class="legend">
      <label><input type="checkbox" id="toggle-zba" checked><span class="swatch zba"></span>ZBA</label>
      <label><input type="checkbox" id="toggle-pb" checked><span class="swatch pb"></span>Planning Board</label>
      <label title="Your saved annotations"><input type="checkbox" id="toggle-ann" checked><span class="swatch pink"></span>Pins</label>
      <label title="Detect spatial clusters among your pins"><input type="checkbox" id="toggle-clusters"><span class="swatch" style="background:transparent;border:2px dashed #ff3e9a;"></span>Clusters</label>
      <span id="cluster-params" style="display:none;font-size:11px;color:var(--muted);margin-left:-8px">
        radius <input type="number" id="cluster-eps" min="100" max="10000" step="100" value="800" style="width:60px;background:#0f1216;border:1px solid var(--border);border-radius:4px;color:var(--text);padding:2px 4px;font:inherit;font-size:11px"> m
        · min <input type="number" id="cluster-minpts" min="2" max="20" value="2" style="width:40px;background:#0f1216;border:1px solid var(--border);border-radius:4px;color:var(--text);padding:2px 4px;font:inherit;font-size:11px">
      </span>
      <label title="Overlay the 2011 Village of Woodbury zoning map"><input type="checkbox" id="toggle-zoning"> Zoning</label>
      <input type="range" id="zoning-opacity" min="0.1" max="1" step="0.05" value="0.55" title="Zoning overlay opacity" style="width:70px;accent-color:var(--accent);margin-left:-6px;">
    </span>
    <span class="count" id="count">— of —</span>
    <a href="trends.html" style="margin-left:16px;color:var(--muted);text-decoration:none;font-size:13px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;">Trends →</a>
  </header>
  <div id="map"></div>
  <div id="controls">
    <div id="cluster-timeline" class="hidden">
      <div class="ct-header">
        <span class="title">Cluster timeline</span>
        <span id="ct-summary"></span>
        <span class="spacer"></span>
        <button id="ct-close" type="button">close</button>
      </div>
      <div class="ct-track">
        <div class="ct-line"></div>
        <!-- dots injected -->
      </div>
      <div class="ct-labels">
        <span id="ct-min"></span>
        <span id="ct-max"></span>
      </div>
    </div>
    <div class="slider-wrap" id="slider">
      <div class="track"></div>
      <div class="track-active" id="track-active"></div>
      <input type="range" id="min" />
      <input type="range" id="max" />
    </div>
    <div class="labels" id="tick-labels"></div>
    <div class="readout">Showing <b id="readout-range"></b></div>
  </div>

  <button id="add-annotation" title="Add an annotation at an address">+</button>
  <div id="annotation-form">
    <h3 id="ann-title">Add annotation</h3>
    <label>Address</label>
    <input type="text" id="ann-address" placeholder="3 Hamilton Ave, Highland Mills, NY" autocomplete="off">
    <label>Description</label>
    <textarea id="ann-description" placeholder="Acquired by This iz it LLC" rows="2"></textarea>
    <label>Date</label>
    <input type="date" id="ann-date" autocomplete="off">
    <div class="err" id="ann-err"></div>
    <div class="row">
      <button class="cancel" id="ann-cancel" type="button">Cancel</button>
      <button id="ann-save" type="button">Save</button>
    </div>
  </div>
  <button id="chat-toggle" title="Ask about these minutes">💬</button>
  <div id="chat-panel">
    <div id="chat-header">
      <h2>Ask the minutes</h2>
      <button id="chat-close" title="Close">×</button>
    </div>
    <div id="chat-messages">
      <div class="chat-msg system">Ask about applications, addresses, applicants, or patterns across years. Example: "what's happened on Smith Clove Road?" or "show me every Hartman application".</div>
    </div>
    <div id="chat-input-wrap">
      <textarea id="chat-input" placeholder="Ask a question…" rows="1"></textarea>
      <button id="chat-send">Send</button>
    </div>
  </div>
</div>

<script>
(async () => {
  const [data, pdfUrls] = await Promise.all([
    fetch("applications_geocoded.json").then(r => r.json()),
    fetch("pdf_urls.json").then(r => r.ok ? r.json() : {}).catch(() => ({})),
  ]);
  const mapped = data.filter(a => a.lat && a.lon);

  function pdfUrlFor(app) {
    const src = app.source_pdf || "";
    // source_pdf is like "pdfs/Zoning_Board/2024/zba2024-0410-minutes.pdf"
    const m = src.match(/([^/]+)\.pdf$/i);
    return m && pdfUrls[m[1]] ? pdfUrls[m[1]] : null;
  }

  // Initial year range includes application years; annotation years are unioned in after load.
  const appYears = mapped.map(a => a.year).filter(Boolean);
  let minYear = Math.min(...appYears);
  let maxYear = Math.max(...appYears);
  const years = [...new Set(appYears)].sort();

  const map = L.map("map", { zoomControl: true }).setView([41.338, -74.110], 13);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: "abcd",
    maxZoom: 20,
  }).addTo(map);

  // Zoning overlays — two layers:
  //   - Main Zoning Layer (covers the whole Village, rotated ~9°, uses rotated-image plugin)
  //   - Inset (higher-detail hamlet zoom, axis-aligned, loaded on top of main)
  const zoningLayers = { main: null, inset: null };
  const zoningToggle = document.getElementById("toggle-zoning");
  const zoningOpacity = document.getElementById("zoning-opacity");

  async function loadZoningLayers() {
    try {
      const mainMeta = await fetch("zoning_map_main_bounds.json").then(r => r.json());
      const c = mainMeta.corners;
      zoningLayers.main = L.imageOverlay.rotated(
        mainMeta.image,
        L.latLng(c.top_left), L.latLng(c.top_right), L.latLng(c.bottom_left),
        { opacity: parseFloat(zoningOpacity.value), interactive: false }
      );
    } catch (e) { console.warn("main zoning layer:", e); }

    try {
      const insetMeta = await fetch("zoning_map_bounds.json").then(r => r.json());
      zoningLayers.inset = L.imageOverlay(insetMeta.image, insetMeta.bounds, {
        opacity: parseFloat(zoningOpacity.value), interactive: false
      });
    } catch (e) { console.warn("inset zoning layer:", e); }

    zoningToggle.disabled = !(zoningLayers.main || zoningLayers.inset);
  }

  zoningToggle.disabled = true;
  loadZoningLayers();

  zoningToggle.addEventListener("change", () => {
    const on = zoningToggle.checked;
    if (zoningLayers.main) on ? zoningLayers.main.addTo(map) : zoningLayers.main.remove();
    if (zoningLayers.inset) on ? zoningLayers.inset.addTo(map) : zoningLayers.inset.remove();
  });
  zoningOpacity.addEventListener("input", () => {
    const o = parseFloat(zoningOpacity.value);
    if (zoningLayers.main)  zoningLayers.main.setOpacity(o);
    if (zoningLayers.inset) zoningLayers.inset.setOpacity(o);
  });

  const layer = L.layerGroup().addTo(map);

  // Annotations state declared early so render() can reference it on first run.
  const annotationLayer = L.layerGroup();
  const annotationMarkers = new Map();   // id -> marker
  const annotationsData = new Map();     // id -> full annotation object (used for filter)
  const clusterLayer = L.layerGroup().addTo(map);  // always on; markers added/cleared per render

  // --- DBSCAN for annotation spatial clustering ----------------------------
  function haversineMeters(aLat, aLon, bLat, bLon) {
    const R = 6371000;
    const rLat1 = aLat * Math.PI / 180;
    const rLat2 = bLat * Math.PI / 180;
    const dLat = (bLat - aLat) * Math.PI / 180;
    const dLon = (bLon - aLon) * Math.PI / 180;
    const h = Math.sin(dLat / 2) ** 2 + Math.cos(rLat1) * Math.cos(rLat2) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(h));
  }

  function dbscan(anns, epsilonM, minPts) {
    // anns: [{id, lat, lon, date, address, ...}, ...]
    const n = anns.length;
    const labels = new Array(n).fill(null);  // null=unvisited, -1=noise, 0+=cluster id
    let cid = 0;

    function regionQuery(i) {
      const out = [];
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        if (haversineMeters(anns[i].lat, anns[i].lon, anns[j].lat, anns[j].lon) <= epsilonM) {
          out.push(j);
        }
      }
      return out;
    }

    for (let i = 0; i < n; i++) {
      if (labels[i] !== null) continue;
      const nbs = regionQuery(i);
      if (nbs.length + 1 < minPts) { labels[i] = -1; continue; }
      labels[i] = cid;
      const queue = [...nbs];
      while (queue.length) {
        const j = queue.shift();
        if (labels[j] === -1) labels[j] = cid;
        if (labels[j] !== null) continue;
        labels[j] = cid;
        const jn = regionQuery(j);
        if (jn.length + 1 >= minPts) for (const k of jn) queue.push(k);
      }
      cid++;
    }

    const groups = new Map();
    for (let i = 0; i < n; i++) {
      if (labels[i] >= 0) {
        if (!groups.has(labels[i])) groups.set(labels[i], []);
        groups.get(labels[i]).push(anns[i]);
      }
    }
    return [...groups.values()];
  }

  function renderClusters(visibleAnns, epsilonM, minPts) {
    clusterLayer.clearLayers();
    if (visibleAnns.length < minPts) return 0;
    const clusters = dbscan(visibleAnns, epsilonM, minPts);
    for (const group of clusters) {
      const avgLat = group.reduce((s, a) => s + a.lat, 0) / group.length;
      const avgLon = group.reduce((s, a) => s + a.lon, 0) / group.length;
      // Radius: max pairwise distance from centroid, padded, floor at epsilon/2
      let maxR = 0;
      for (const a of group) maxR = Math.max(maxR, haversineMeters(avgLat, avgLon, a.lat, a.lon));
      const radius = Math.max(maxR + 60, epsilonM * 0.4);
      const dates = group.map(a => a.date).filter(Boolean).sort();
      const span = dates.length
        ? (dates[0] === dates[dates.length - 1] ? formatAnnDate(dates[0])
           : `${formatAnnDate(dates[0])} – ${formatAnnDate(dates[dates.length - 1])}`)
        : "(no dates)";
      const circle = L.circle([avgLat, avgLon], {
        radius,
        color: "#ff3e9a",
        weight: 2,
        opacity: 0.9,
        fillColor: "#ff3e9a",
        fillOpacity: 0.08,
        dashArray: "6 5",
        interactive: true,
      });
      const members = group.slice().sort((a, b) => (a.date || "").localeCompare(b.date || ""));
      const memberList = members
        .map(a => `<div style="font-size:11px;color:var(--muted);margin-top:3px">${escapeHtml(formatAnnDate(a.date))} · ${escapeHtml(a.address)}</div>`)
        .join("");
      circle.bindPopup(`
        <div class="popup-inner">
          <div class="name" style="color:#ff3e9a">Cluster of ${group.length} pins</div>
          <div class="meta">${escapeHtml(span)}</div>
          <div class="meta">~${Math.round(radius)} m radius · ${group.length} purchases</div>
          ${memberList}
        </div>`);
      // Timeline integration
      circle.on("popupopen", () => showClusterTimeline(members));
      circle.on("popupclose", () => {
        // Only hide the timeline if *this* cluster's popup is closing AND
        // the user isn't in the middle of clicking a different one
        if (activeClusterMembers === members) hideClusterTimeline();
      });
      circle.addTo(clusterLayer);
    }
    return clusters.length;
  }

  // --- Cluster timeline strip ---------------------------------------------
  let activeClusterMembers = null;
  const ctEl = document.getElementById("cluster-timeline");
  const ctTrack = ctEl.querySelector(".ct-track");
  const ctSummary = document.getElementById("ct-summary");
  const ctMinLabel = document.getElementById("ct-min");
  const ctMaxLabel = document.getElementById("ct-max");
  document.getElementById("ct-close").addEventListener("click", () => {
    map.closePopup();
    hideClusterTimeline();
  });

  function showClusterTimeline(members) {
    activeClusterMembers = members;
    renderTimelineDots(members);
    ctEl.classList.remove("hidden");
  }

  function renderTimelineDots(members) {
    ctTrack.querySelectorAll(".ct-dot, .ct-today-marker").forEach(d => d.remove());
    const dated = members.filter(a => a.date);
    if (!dated.length) { hideClusterTimeline(); return; }

    const toTime = s => new Date(s + "T12:00:00").getTime();
    const times = dated.map(a => toTime(a.date));
    const minT = Math.min(...times);
    const clusterMaxT = Math.max(...times);
    const now = Date.now();
    // Always extend the track to today so the cluster's timing is visible
    // in real calendar perspective, not compressed into its own window.
    const maxT = Math.max(clusterMaxT, now);
    const span = Math.max(maxT - minT, 1);

    for (const a of dated) {
      const pct = span === 1 ? 50 : ((toTime(a.date) - minT) / span) * 100;
      const dot = document.createElement("div");
      dot.className = "ct-dot";
      dot.style.left = pct + "%";
      dot.title = `${formatAnnDate(a.date)} — ${a.address}`;
      dot.addEventListener("click", (e) => {
        e.stopPropagation();
        map.flyTo([a.lat, a.lon], 17, { duration: 0.5 });
        const m = annotationMarkers.get(a.id);
        if (m && annotationLayer.hasLayer(m)) setTimeout(() => m.openPopup(), 600);
      });
      ctTrack.appendChild(dot);
    }

    // Today marker (only when today sits within the track)
    if (now >= minT && now <= maxT) {
      const pct = ((now - minT) / span) * 100;
      const mk = document.createElement("div");
      mk.className = "ct-today-marker";
      mk.style.cssText =
        `position:absolute;top:-2px;bottom:-2px;left:${pct}%;width:2px;` +
        `background:var(--text);opacity:0.6;transform:translateX(-1px);pointer-events:none;`;
      const lbl = document.createElement("div");
      lbl.textContent = "today";
      lbl.style.cssText =
        `position:absolute;top:-14px;left:${pct}%;transform:translateX(-50%);` +
        `font-size:9px;color:var(--text);opacity:0.7;text-transform:uppercase;letter-spacing:0.08em;`;
      ctTrack.appendChild(mk);
      ctTrack.appendChild(lbl);
    }

    ctMinLabel.textContent = formatAnnDate(dated[0].date);
    ctMaxLabel.textContent = now > clusterMaxT
      ? "today"
      : formatAnnDate(dated[dated.length - 1].date);
    ctSummary.innerHTML = `· <b style="color:var(--text);font-weight:500">${dated.length} acquisitions</b> over ${daySpanLabel(minT, clusterMaxT)}`;
  }

  function hideClusterTimeline() {
    activeClusterMembers = null;
    ctEl.classList.add("hidden");
  }

  function daySpanLabel(minT, maxT) {
    const days = Math.round((maxT - minT) / 86400000);
    if (days === 0) return "the same day";
    if (days < 60) return `${days} days`;
    if (days < 730) return `${Math.round(days / 30)} months`;
    return `${(days / 365).toFixed(1)} years`;
  }

  function formatAnnDate(iso) {
    if (!iso) return "";
    const d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  }

  const BOARD_COLOR = { ZBA: "#ff6b35", PB: "#4da6ff" };
  const BOARD_LABEL = { ZBA: "Zoning Board of Appeals", PB: "Planning Board" };

  // Deterministic sub-meter offset to separate markers at identical coordinates.
  // Circle markers otherwise overlap completely for multiple apps at one address.
  function jitter(a) {
    let h = 2166136261;
    const s = `${a.source_pdf}:${a.label}:${a.name}`;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    const dx = ((h & 0xff) / 255 - 0.5) * 0.0003;
    const dy = (((h >>> 8) & 0xff) / 255 - 0.5) * 0.0003;
    return [a.lat + dy, a.lon + dx];
  }

  const makeMarker = (a) => {
    const color = BOARD_COLOR[a.board] || "#aaaaaa";
    const m = L.circleMarker(jitter(a), {
      radius: 7,
      fillColor: color,
      color: "#0f1216",
      weight: 1.5,
      fillOpacity: 0.85,
    });
    const desc = (a.raw_block || "").slice(0, 480).replace(/\s+/g, " ");
    const boardTag = `<span style="color:${color};font-weight:600">${BOARD_LABEL[a.board] || a.board}</span>`;
    const url = pdfUrlFor(a);
    const pdfLink = url
      ? `<div class="meta"><a href="${url}" target="_blank" rel="noopener" style="color:${color};text-decoration:underline">Open source PDF ↗</a></div>`
      : "";
    m.bindPopup(`
      <div class="popup-inner">
        <div class="name">${escapeHtml(a.name)}</div>
        <div class="meta">${boardTag} · ${a.meeting_date || "—"} · ${escapeHtml(a.locality || "")} ${a.zoning_district ? "· " + escapeHtml(a.zoning_district) : ""}</div>
        <div class="meta">${escapeHtml(a.street || "")} ${a.tax_map ? "· tax map " + a.tax_map : ""}</div>
        <div class="meta">${escapeHtml(a.request_type || "")}</div>
        ${pdfLink}
        <div class="desc">${escapeHtml(desc)}${desc.length >= 480 ? "…" : ""}</div>
      </div>`);
    return m;
  };

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  const minEl = document.getElementById("min");
  const maxEl = document.getElementById("max");
  const readoutEl = document.getElementById("readout-range");
  const countEl = document.getElementById("count");
  const trackActive = document.getElementById("track-active");
  const tickLabels = document.getElementById("tick-labels");

  // Populate year ticks
  years.forEach(y => {
    const s = document.createElement("span");
    s.textContent = y;
    tickLabels.appendChild(s);
  });

  for (const el of [minEl, maxEl]) {
    el.min = minYear; el.max = maxYear; el.step = 1;
  }
  minEl.value = minYear;
  maxEl.value = maxYear;

  const toggleZba = document.getElementById("toggle-zba");
  const togglePb = document.getElementById("toggle-pb");

  function render() {
    let lo = parseInt(minEl.value, 10);
    let hi = parseInt(maxEl.value, 10);
    if (lo > hi) { const t = lo; lo = hi; hi = t; }

    const wantZba = toggleZba.checked;
    const wantPb = togglePb.checked;

    layer.clearLayers();
    const visible = mapped.filter(a =>
      a.year >= lo && a.year <= hi &&
      ((a.board === "ZBA" && wantZba) || (a.board === "PB" && wantPb))
    );
    visible.forEach(a => makeMarker(a).addTo(layer));

    const nZba = visible.filter(a => a.board === "ZBA").length;
    const nPb = visible.filter(a => a.board === "PB").length;

    // Annotation filtering — toggle + year range
    const annTogg = document.getElementById("toggle-ann");
    const annOn = annTogg && annTogg.checked;
    const visibleAnns = [];
    let nAnn = 0;
    for (const [id, marker] of annotationMarkers) {
      const ann = annotationsData.get(id);
      const yearOk = !ann || !ann.year || (ann.year >= lo && ann.year <= hi);
      const show = annOn && yearOk;
      if (show) {
        if (!annotationLayer.hasLayer(marker)) annotationLayer.addLayer(marker);
        nAnn++;
        if (ann) visibleAnns.push(ann);
      } else if (annotationLayer.hasLayer(marker)) {
        annotationLayer.removeLayer(marker);
      }
    }

    // Cluster detection over the currently-visible pins
    const clusterTogg = document.getElementById("toggle-clusters");
    const epsEl = document.getElementById("cluster-eps");
    const minEl2 = document.getElementById("cluster-minpts");
    const clusterOn = clusterTogg && clusterTogg.checked && annOn;
    if (clusterOn) {
      const epsilonM = Math.max(100, parseInt(epsEl.value, 10) || 800);
      const minPts = Math.max(2, parseInt(minEl2.value, 10) || 2);
      renderClusters(visibleAnns, epsilonM, minPts);
    } else {
      clusterLayer.clearLayers();
    }

    readoutEl.textContent = lo === hi ? `${lo}` : `${lo} – ${hi}`;
    const pinsPart = annotationMarkers.size ? ` · Pins ${nAnn}` : "";
    countEl.innerHTML = `<b>${visible.length + nAnn}</b> visible · ZBA ${nZba} · PB ${nPb}${pinsPart}`;

    const span = maxYear - minYear || 1;
    const leftPct = ((lo - minYear) / span) * 100;
    const rightPct = ((hi - minYear) / span) * 100;
    trackActive.style.left = leftPct + "%";
    trackActive.style.right = (100 - rightPct) + "%";
  }

  minEl.addEventListener("input", render);
  maxEl.addEventListener("input", render);
  toggleZba.addEventListener("change", render);
  togglePb.addEventListener("change", render);
  render();

  // --- Annotations -------------------------------------------------------
  // annotationLayer stays on the map; visibility is driven per-marker inside render().
  annotationLayer.addTo(map);
  const annToggle = document.getElementById("toggle-ann");
  annToggle.addEventListener("change", render);

  // Cluster detection wiring
  const clusterToggle = document.getElementById("toggle-clusters");
  const clusterParams = document.getElementById("cluster-params");
  const clusterEps = document.getElementById("cluster-eps");
  const clusterMinPts = document.getElementById("cluster-minpts");
  function syncClusterUi() { clusterParams.style.display = clusterToggle.checked ? "inline" : "none"; }
  clusterToggle.addEventListener("change", () => { syncClusterUi(); render(); });
  clusterEps.addEventListener("input", render);
  clusterMinPts.addEventListener("input", render);
  syncClusterUi();

  function updateCountDisplay() { render(); }

  function renderAnnotation(ann) {
    if (annotationMarkers.has(ann.id)) {
      annotationLayer.removeLayer(annotationMarkers.get(ann.id));
    }
    const m = L.circleMarker([ann.lat, ann.lon], {
      radius: 8,
      fillColor: "#ff3e9a",
      color: "#0f1216",
      weight: 1.5,
      fillOpacity: 0.9,
    });
    const descHtml = ann.description ? `<div class="desc">${escapeHtml(ann.description)}</div>` : "";
    const dateHtml = ann.date ? `<div class="meta">${escapeHtml(formatAnnDate(ann.date))}</div>` : "";
    const btnStyle = "background:transparent;border:1px solid #ff3e9a;color:#ff3e9a;border-radius:4px;padding:3px 8px;cursor:pointer;font:inherit;font-size:11px;margin-right:6px";
    m.bindPopup(`
      <div class="popup-inner">
        <div class="name" style="color:#ff3e9a">${escapeHtml(ann.address)}</div>
        ${dateHtml}
        ${descHtml}
        <div class="meta" style="margin-top:8px">
          <button data-ann-edit="${ann.id}" style="${btnStyle}">Edit</button>
          <button data-ann-delete="${ann.id}" style="${btnStyle}">Delete</button>
        </div>
      </div>`);
    m.on("popupopen", () => {
      document.querySelector(`[data-ann-edit="${ann.id}"]`)
        ?.addEventListener("click", () => startEdit(ann.id));
      document.querySelector(`[data-ann-delete="${ann.id}"]`)
        ?.addEventListener("click", () => deleteAnnotation(ann.id));
    });
    annotationMarkers.set(ann.id, m);
    annotationsData.set(ann.id, ann);
    // If annotation's year is outside the current slider range, extend the slider.
    if (ann.year) {
      let changed = false;
      if (ann.year < minYear) { minYear = ann.year; changed = true; }
      if (ann.year > maxYear) { maxYear = ann.year; changed = true; }
      if (changed) reconfigureSlider();
    }
    updateCountDisplay();
  }

  function reconfigureSlider() {
    const oldMinAttr = parseInt(minEl.min, 10);
    const oldMaxAttr = parseInt(maxEl.max, 10);
    const wasAtMin = parseInt(minEl.value, 10) === oldMinAttr;
    const wasAtMax = parseInt(maxEl.value, 10) === oldMaxAttr;

    minEl.min = maxEl.min = minYear;
    minEl.max = maxEl.max = maxYear;
    if (wasAtMin) minEl.value = minYear;
    if (wasAtMax) maxEl.value = maxYear;

    tickLabels.innerHTML = "";
    for (let y = minYear; y <= maxYear; y++) {
      const s = document.createElement("span");
      s.textContent = y;
      tickLabels.appendChild(s);
    }
    render();
  }

  async function loadAnnotations() {
    try {
      const res = await fetch("/annotations");
      const body = await res.json();
      (body.annotations || []).forEach(renderAnnotation);
    } catch (e) { console.warn("annotations load:", e); }
  }

  async function deleteAnnotation(id) {
    const res = await fetch(`/annotations?id=${encodeURIComponent(id)}`, { method: "DELETE" });
    if (!res.ok) return;
    const m = annotationMarkers.get(id);
    if (m) { annotationLayer.removeLayer(m); annotationMarkers.delete(id); }
    annotationsData.delete(id);
    updateCountDisplay();
  }

  // Form wiring
  const addBtn = document.getElementById("add-annotation");
  const form = document.getElementById("annotation-form");
  const annTitle = document.getElementById("ann-title");
  const annAddress = document.getElementById("ann-address");
  const annDescription = document.getElementById("ann-description");
  const annDate = document.getElementById("ann-date");
  const annErr = document.getElementById("ann-err");
  const annSave = document.getElementById("ann-save");
  const annCancel = document.getElementById("ann-cancel");

  let editingId = null;  // null → create; string id → edit

  function openForm({ title = "Add annotation", values = null, id = null } = {}) {
    editingId = id;
    annTitle.textContent = title;
    annSave.textContent = id ? "Save changes" : "Save";
    if (values) {
      annAddress.value = values.address || "";
      annDescription.value = values.description || "";
      annDate.value = values.date || "";
    } else {
      annAddress.value = annDescription.value = annDate.value = "";
    }
    form.classList.add("open");
    annErr.textContent = "";
    annAddress.focus();
  }
  function closeForm() {
    form.classList.remove("open");
    annAddress.value = annDescription.value = annDate.value = "";
    annErr.textContent = "";
    editingId = null;
    annTitle.textContent = "Add annotation";
    annSave.textContent = "Save";
  }
  addBtn.addEventListener("click", () => form.classList.contains("open") ? closeForm() : openForm());
  annCancel.addEventListener("click", closeForm);

  function startEdit(id) {
    const ann = annotationsData.get(id);
    if (!ann) return;
    map.closePopup();
    openForm({
      title: "Edit annotation",
      id,
      values: { address: ann.address, description: ann.description, date: ann.date },
    });
  }

  async function submitAnnotation() {
    const address = annAddress.value.trim();
    if (!address) { annErr.textContent = "Address is required"; return; }
    const date = annDate.value.trim();
    if (!date) { annErr.textContent = "Date is required"; return; }
    annSave.disabled = true;
    annErr.textContent = editingId ? "Saving…" : "Geocoding…";
    const payload = { address, description: annDescription.value.trim(), date };
    try {
      const url = editingId ? `/annotations?id=${encodeURIComponent(editingId)}` : "/annotations";
      const method = editingId ? "PUT" : "POST";
      const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const body = await res.json();
      if (!res.ok || body.error) {
        annErr.textContent = body.error || `error ${res.status}`;
        return;
      }
      renderAnnotation(body.annotation);
      map.flyTo([body.annotation.lat, body.annotation.lon], 17, { duration: 0.6 });
      closeForm();
    } catch (e) {
      annErr.textContent = `network error: ${e.message}`;
    } finally {
      annSave.disabled = false;
    }
  }
  annSave.addEventListener("click", submitAnnotation);
  [annAddress, annDate].forEach(el =>
    el.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); submitAnnotation(); }
    })
  );

  loadAnnotations();

  // Chat is handled by chat.js — expose a map-flyTo callback for citation clicks
  window.onChatCitation = (c) => {
    if (c && c.lat && c.lon) map.flyTo([c.lat, c.lon], 17, { duration: 0.8 });
  };
})();
</script>
</body>
</html>
