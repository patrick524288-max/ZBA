<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Woodbury ZBA Applications</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet-imageoverlay-rotated@0.2.1/Leaflet.ImageOverlay.Rotated.js"></script>
<style>
  :root {
    --bg: #0f1216;
    --panel: #1a1f26;
    --text: #e6ebf2;
    --muted: #8a95a5;
    --accent: #ff6b35;
    --accent-dim: rgba(255,107,53,0.2);
    --border: #2b3340;
  }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
  #app { display: flex; flex-direction: column; height: 100vh; }
  header { padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; }
  header h1 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { color: var(--muted); font-size: 13px; }
  header .count { margin-left: auto; color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; }
  header .count b { color: var(--text); font-weight: 500; }
  .legend { display: flex; gap: 16px; margin-left: 20px; font-size: 12px; color: var(--muted); align-items: center; }
  .legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; border: 1.5px solid #0f1216; }
  .legend .zba { background: #ff6b35; }
  .legend .pb { background: #4da6ff; }
  .legend label { cursor: pointer; user-select: none; }
  .legend input { margin-right: 4px; vertical-align: middle; accent-color: var(--accent); }
  #map { flex: 1; background: #0a0d11; }
  #controls { padding: 16px 24px 20px; background: var(--panel); border-top: 1px solid var(--border); }
  .slider-wrap { position: relative; height: 40px; }
  .slider-wrap input[type=range] { position: absolute; width: 100%; top: 14px; margin: 0; pointer-events: none; -webkit-appearance: none; background: transparent; }
  .slider-wrap input[type=range]::-webkit-slider-thumb {
    pointer-events: auto; -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); border: 2px solid #0f1216; cursor: pointer; margin-top: -8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .slider-wrap input[type=range]::-moz-range-thumb {
    pointer-events: auto; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); border: 2px solid #0f1216; cursor: pointer;
  }
  .track { position: absolute; left: 0; right: 0; top: 22px; height: 3px; background: var(--border); border-radius: 3px; }
  .track-active { position: absolute; top: 22px; height: 3px; background: var(--accent); border-radius: 3px; }
  .labels { display: flex; justify-content: space-between; margin-top: 4px; color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
  .readout { text-align: center; margin-top: 6px; font-size: 13px; font-weight: 500; }
  .readout b { color: var(--accent); font-variant-numeric: tabular-nums; }
  .tick { position: absolute; top: 20px; width: 1px; height: 7px; background: var(--border); }
  .popup-inner { font-size: 13px; line-height: 1.5; }
  .popup-inner .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .popup-inner .meta { color: var(--muted); margin-bottom: 6px; font-size: 12px; }
  .popup-inner .desc { max-height: 140px; overflow: auto; }
  /* Leaflet popup theme override */
  .leaflet-popup-content-wrapper { background: #1a1f26; color: var(--text); border: 1px solid var(--border); }
  .leaflet-popup-tip { background: #1a1f26; }
  .leaflet-popup-content { margin: 10px 14px; }
  .leaflet-container { background: #0a0d11; }

  /* --- Chat panel --- */
  #chat-toggle {
    position: fixed; bottom: 110px; right: 24px; z-index: 500;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: #0f1216; border: none;
    font-size: 22px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s;
  }
  #chat-toggle:hover { transform: scale(1.05); }
  #chat-toggle.hidden { display: none; }

  #chat-panel {
    position: fixed; bottom: 110px; right: 24px; z-index: 500;
    width: 400px; height: min(560px, calc(100vh - 200px));
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    display: none; flex-direction: column; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  #chat-panel.open { display: flex; }
  #chat-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  #chat-header h2 { margin: 0; font-size: 14px; font-weight: 600; flex: 1; }
  #chat-close {
    background: none; border: none; color: var(--muted); font-size: 20px;
    cursor: pointer; padding: 0; width: 24px; height: 24px; line-height: 1;
  }
  #chat-close:hover { color: var(--text); }
  #chat-messages {
    flex: 1; overflow-y: auto; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 12px;
    font-size: 13px; line-height: 1.55;
  }
  .chat-msg { padding: 10px 12px; border-radius: 10px; word-wrap: break-word; }
  .chat-msg.user { background: var(--accent-dim); border: 1px solid rgba(255,107,53,0.3); align-self: flex-end; max-width: 85%; }
  .chat-msg.assistant { background: #12161c; border: 1px solid var(--border); }
  .chat-msg.error { background: rgba(255, 80, 80, 0.1); border: 1px solid rgba(255, 80, 80, 0.3); color: #ffc9c9; }
  .chat-msg.system { color: var(--muted); font-size: 12px; font-style: italic; text-align: center; }
  .chat-msg p { margin: 0 0 8px; }
  .chat-msg p:last-child { margin-bottom: 0; }
  .chat-citations { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11px; }
  .chat-citations .label { color: var(--muted); margin-bottom: 4px; }
  .chat-citations a { color: var(--accent); text-decoration: none; cursor: pointer; display: block; margin-bottom: 3px; }
  .chat-citations a:hover { text-decoration: underline; }
  .citation-board { display: inline-block; width: 34px; font-size: 10px; font-weight: 600; text-transform: uppercase; opacity: 0.8; }
  .citation-board.ZBA { color: #ff6b35; }
  .citation-board.PB { color: #4da6ff; }
  #chat-input-wrap {
    border-top: 1px solid var(--border); padding: 10px 12px;
    display: flex; gap: 8px; align-items: flex-end;
  }
  #chat-input {
    flex: 1; background: #0f1216; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 10px; font: inherit; font-size: 13px;
    resize: none; outline: none; min-height: 36px; max-height: 120px;
  }
  #chat-input:focus { border-color: var(--accent); }
  #chat-send {
    background: var(--accent); color: #0f1216; border: none; border-radius: 8px;
    padding: 0 14px; height: 36px; font-weight: 600; cursor: pointer;
  }
  #chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .thinking-dots::after {
    content: "…"; display: inline-block; animation: dots 1.4s steps(4) infinite;
    letter-spacing: 2px;
  }
  @keyframes dots { 0% { content: "" } 25% { content: "." } 50% { content: ".." } 75% { content: "..." } }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Village of Woodbury — Board Applications</h1>
    <span class="legend">
      <label><input type="checkbox" id="toggle-zba" checked><span class="swatch zba"></span>ZBA</label>
      <label><input type="checkbox" id="toggle-pb" checked><span class="swatch pb"></span>Planning Board</label>
      <label title="Overlay the 2011 Village of Woodbury zoning map"><input type="checkbox" id="toggle-zoning"> Zoning</label>
      <input type="range" id="zoning-opacity" min="0.1" max="1" step="0.05" value="0.55" title="Zoning overlay opacity" style="width:70px;accent-color:var(--accent);margin-left:-6px;">
    </span>
    <span class="count" id="count">— of —</span>
  </header>
  <div id="map"></div>
  <div id="controls">
    <div class="slider-wrap" id="slider">
      <div class="track"></div>
      <div class="track-active" id="track-active"></div>
      <input type="range" id="min" />
      <input type="range" id="max" />
    </div>
    <div class="labels" id="tick-labels"></div>
    <div class="readout">Showing <b id="readout-range"></b></div>
  </div>

  <button id="chat-toggle" title="Ask about these minutes">💬</button>
  <div id="chat-panel">
    <div id="chat-header">
      <h2>Ask the minutes</h2>
      <button id="chat-close" title="Close">×</button>
    </div>
    <div id="chat-messages">
      <div class="chat-msg system">Ask about applications, addresses, applicants, or patterns across years. Example: "what's happened on Smith Clove Road?" or "show me every Hartman application".</div>
    </div>
    <div id="chat-input-wrap">
      <textarea id="chat-input" placeholder="Ask a question…" rows="1"></textarea>
      <button id="chat-send">Send</button>
    </div>
  </div>
</div>

<script>
(async () => {
  const [data, pdfUrls] = await Promise.all([
    fetch("applications_geocoded.json").then(r => r.json()),
    fetch("pdf_urls.json").then(r => r.ok ? r.json() : {}).catch(() => ({})),
  ]);
  const mapped = data.filter(a => a.lat && a.lon);

  function pdfUrlFor(app) {
    const src = app.source_pdf || "";
    // source_pdf is like "pdfs/Zoning_Board/2024/zba2024-0410-minutes.pdf"
    const m = src.match(/([^/]+)\.pdf$/i);
    return m && pdfUrls[m[1]] ? pdfUrls[m[1]] : null;
  }

  const years = [...new Set(mapped.map(a => a.year).filter(Boolean))].sort();
  const minYear = years[0];
  const maxYear = years[years.length - 1];

  const map = L.map("map", { zoomControl: true }).setView([41.338, -74.110], 13);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: "abcd",
    maxZoom: 20,
  }).addTo(map);

  // Zoning overlays — two layers:
  //   - Main Zoning Layer (covers the whole Village, rotated ~9°, uses rotated-image plugin)
  //   - Inset (higher-detail hamlet zoom, axis-aligned, loaded on top of main)
  const zoningLayers = { main: null, inset: null };
  const zoningToggle = document.getElementById("toggle-zoning");
  const zoningOpacity = document.getElementById("zoning-opacity");

  async function loadZoningLayers() {
    try {
      const mainMeta = await fetch("zoning_map_main_bounds.json").then(r => r.json());
      const c = mainMeta.corners;
      zoningLayers.main = L.imageOverlay.rotated(
        mainMeta.image,
        L.latLng(c.top_left), L.latLng(c.top_right), L.latLng(c.bottom_left),
        { opacity: parseFloat(zoningOpacity.value), interactive: false }
      );
    } catch (e) { console.warn("main zoning layer:", e); }

    try {
      const insetMeta = await fetch("zoning_map_bounds.json").then(r => r.json());
      zoningLayers.inset = L.imageOverlay(insetMeta.image, insetMeta.bounds, {
        opacity: parseFloat(zoningOpacity.value), interactive: false
      });
    } catch (e) { console.warn("inset zoning layer:", e); }

    zoningToggle.disabled = !(zoningLayers.main || zoningLayers.inset);
  }

  zoningToggle.disabled = true;
  loadZoningLayers();

  zoningToggle.addEventListener("change", () => {
    const on = zoningToggle.checked;
    if (zoningLayers.main) on ? zoningLayers.main.addTo(map) : zoningLayers.main.remove();
    if (zoningLayers.inset) on ? zoningLayers.inset.addTo(map) : zoningLayers.inset.remove();
  });
  zoningOpacity.addEventListener("input", () => {
    const o = parseFloat(zoningOpacity.value);
    if (zoningLayers.main)  zoningLayers.main.setOpacity(o);
    if (zoningLayers.inset) zoningLayers.inset.setOpacity(o);
  });

  const layer = L.layerGroup().addTo(map);

  const BOARD_COLOR = { ZBA: "#ff6b35", PB: "#4da6ff" };
  const BOARD_LABEL = { ZBA: "Zoning Board of Appeals", PB: "Planning Board" };

  // Deterministic sub-meter offset to separate markers at identical coordinates.
  // Circle markers otherwise overlap completely for multiple apps at one address.
  function jitter(a) {
    let h = 2166136261;
    const s = `${a.source_pdf}:${a.label}:${a.name}`;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    const dx = ((h & 0xff) / 255 - 0.5) * 0.0003;
    const dy = (((h >>> 8) & 0xff) / 255 - 0.5) * 0.0003;
    return [a.lat + dy, a.lon + dx];
  }

  const makeMarker = (a) => {
    const color = BOARD_COLOR[a.board] || "#aaaaaa";
    const m = L.circleMarker(jitter(a), {
      radius: 7,
      fillColor: color,
      color: "#0f1216",
      weight: 1.5,
      fillOpacity: 0.85,
    });
    const desc = (a.raw_block || "").slice(0, 480).replace(/\s+/g, " ");
    const boardTag = `<span style="color:${color};font-weight:600">${BOARD_LABEL[a.board] || a.board}</span>`;
    const url = pdfUrlFor(a);
    const pdfLink = url
      ? `<div class="meta"><a href="${url}" target="_blank" rel="noopener" style="color:${color};text-decoration:underline">Open source PDF ↗</a></div>`
      : "";
    m.bindPopup(`
      <div class="popup-inner">
        <div class="name">${escapeHtml(a.name)}</div>
        <div class="meta">${boardTag} · ${a.meeting_date || "—"} · ${escapeHtml(a.locality || "")} ${a.zoning_district ? "· " + escapeHtml(a.zoning_district) : ""}</div>
        <div class="meta">${escapeHtml(a.street || "")} ${a.tax_map ? "· tax map " + a.tax_map : ""}</div>
        <div class="meta">${escapeHtml(a.request_type || "")}</div>
        ${pdfLink}
        <div class="desc">${escapeHtml(desc)}${desc.length >= 480 ? "…" : ""}</div>
      </div>`);
    return m;
  };

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  const minEl = document.getElementById("min");
  const maxEl = document.getElementById("max");
  const readoutEl = document.getElementById("readout-range");
  const countEl = document.getElementById("count");
  const trackActive = document.getElementById("track-active");
  const tickLabels = document.getElementById("tick-labels");

  // Populate year ticks
  years.forEach(y => {
    const s = document.createElement("span");
    s.textContent = y;
    tickLabels.appendChild(s);
  });

  for (const el of [minEl, maxEl]) {
    el.min = minYear; el.max = maxYear; el.step = 1;
  }
  minEl.value = minYear;
  maxEl.value = maxYear;

  const toggleZba = document.getElementById("toggle-zba");
  const togglePb = document.getElementById("toggle-pb");

  function render() {
    let lo = parseInt(minEl.value, 10);
    let hi = parseInt(maxEl.value, 10);
    if (lo > hi) { const t = lo; lo = hi; hi = t; }

    const wantZba = toggleZba.checked;
    const wantPb = togglePb.checked;

    layer.clearLayers();
    const visible = mapped.filter(a =>
      a.year >= lo && a.year <= hi &&
      ((a.board === "ZBA" && wantZba) || (a.board === "PB" && wantPb))
    );
    visible.forEach(a => makeMarker(a).addTo(layer));

    const nZba = visible.filter(a => a.board === "ZBA").length;
    const nPb = visible.filter(a => a.board === "PB").length;
    readoutEl.textContent = lo === hi ? `${lo}` : `${lo} – ${hi}`;
    countEl.innerHTML = `<b>${visible.length}</b> of ${mapped.length} visible · ZBA ${nZba} · PB ${nPb}`;

    const span = maxYear - minYear || 1;
    const leftPct = ((lo - minYear) / span) * 100;
    const rightPct = ((hi - minYear) / span) * 100;
    trackActive.style.left = leftPct + "%";
    trackActive.style.right = (100 - rightPct) + "%";
  }

  minEl.addEventListener("input", render);
  maxEl.addEventListener("input", render);
  toggleZba.addEventListener("change", render);
  togglePb.addEventListener("change", render);
  render();

  // --- Chat panel ---
  const chatToggle = document.getElementById("chat-toggle");
  const chatPanel = document.getElementById("chat-panel");
  const chatClose = document.getElementById("chat-close");
  const chatMessages = document.getElementById("chat-messages");
  const chatInput = document.getElementById("chat-input");
  const chatSend = document.getElementById("chat-send");

  const openChat = () => {
    chatPanel.classList.add("open");
    chatToggle.classList.add("hidden");
    chatInput.focus();
  };
  const closeChat = () => {
    chatPanel.classList.remove("open");
    chatToggle.classList.remove("hidden");
  };
  chatToggle.addEventListener("click", openChat);
  chatClose.addEventListener("click", closeChat);

  chatInput.addEventListener("input", () => {
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(120, chatInput.scrollHeight) + "px";
  });

  function appendMessage(role, content, opts = {}) {
    const div = document.createElement("div");
    div.className = `chat-msg ${role}`;
    if (opts.raw) {
      div.innerHTML = content;
    } else {
      div.textContent = content;
    }
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div;
  }

  // Very light markdown: paragraphs + bullet lists.
  function renderMarkdown(text) {
    const safe = escapeHtml(text);
    const lines = safe.split(/\n/);
    const blocks = [];
    let para = [];
    let bullets = [];
    const flushPara = () => {
      if (para.length) { blocks.push(`<p>${para.join(" ")}</p>`); para = []; }
    };
    const flushBullets = () => {
      if (bullets.length) { blocks.push(`<ul>${bullets.map(b => `<li>${b}</li>`).join("")}</ul>`); bullets = []; }
    };
    for (const line of lines) {
      const t = line.trim();
      if (!t) { flushPara(); flushBullets(); continue; }
      const mBullet = t.match(/^[-*]\s+(.*)/);
      if (mBullet) { flushPara(); bullets.push(mBullet[1]); continue; }
      flushBullets();
      para.push(t);
    }
    flushPara(); flushBullets();
    // Bold citations like [ZBA 2024-04-10: 58 Quaker]
    return blocks.join("")
      .replace(/\[(ZBA|PB|VBoT)\s+([^\]]+?)\]/g, '<code style="background:rgba(255,107,53,0.15);padding:1px 5px;border-radius:3px;font-size:11px;">[$1 $2]</code>');
  }

  function renderCitations(citations) {
    if (!citations || !citations.length) return "";
    const items = citations.slice(0, 8).map((c, i) => {
      const board = c.board || "?";
      const label = `${c.meeting_date || c.year || "?"} · ${c.name || "(unnamed)"}`;
      const loc = [c.street, c.locality].filter(Boolean).join(", ");
      const url = pdfUrlFor(c);
      const pdfIcon = url
        ? ` <a href="${url}" target="_blank" rel="noopener" title="Open source PDF" style="color:var(--accent);text-decoration:none;padding-left:4px;">↗</a>`
        : "";
      return `<div><a data-idx="${i}">
        <span class="citation-board ${board}">${board}</span>
        ${escapeHtml(label)}${loc ? ` <span style="color:var(--muted)"> — ${escapeHtml(loc)}</span>` : ""}
      </a>${pdfIcon}</div>`;
    }).join("");
    return `<div class="chat-citations"><div class="label">Sources (${citations.length})</div>${items}</div>`;
  }

  async function sendQuestion() {
    const q = chatInput.value.trim();
    if (!q) return;
    appendMessage("user", q);
    chatInput.value = "";
    chatInput.style.height = "auto";
    chatSend.disabled = true;

    const thinking = appendMessage("assistant", `<span class="thinking-dots">Searching minutes</span>`, { raw: true });

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q }),
      });
      const body = await res.json();
      thinking.remove();
      if (!res.ok || body.error) {
        appendMessage("error", body.error || `error ${res.status}`);
        return;
      }
      const html = renderMarkdown(body.answer) + renderCitations(body.citations);
      const msg = appendMessage("assistant", html, { raw: true });

      // Citation click → fly the map to that citation
      msg.querySelectorAll(".chat-citations a").forEach(a => {
        a.addEventListener("click", () => {
          const idx = parseInt(a.dataset.idx, 10);
          const c = body.citations[idx];
          if (c && c.lat && c.lon) {
            map.flyTo([c.lat, c.lon], 17, { duration: 0.8 });
          }
        });
      });
    } catch (e) {
      thinking.remove();
      appendMessage("error", `network error: ${e.message}`);
    } finally {
      chatSend.disabled = false;
      chatInput.focus();
    }
  }

  chatSend.addEventListener("click", sendQuestion);
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });
})();
</script>
</body>
</html>
